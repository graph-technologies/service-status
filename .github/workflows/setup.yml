name: Setup CI
on:
  push:
    paths:
      - ".upptimerc.yml"
  repository_dispatch:
    types: [setup]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  release:
    name: Setup Upptime
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Ensure directories exist
        run: mkdir -p api graphs
      - name: Update template
        uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "update-template"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
      - name: Update response time
        uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "response-time"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
      - name: Update summary in README
        uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "readme"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
      - name: Ensure Graphs CI workflow enabled
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          workflow_file="graphs.yml"
          repo="${{ github.repository }}"
          
          # Query workflow state
          response=$(curl -s -w "\n%{http_code}" -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/$repo/actions/workflows/$workflow_file")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          if [ "$http_code" != "200" ]; then
            echo "Error: Failed to query workflow state (HTTP $http_code)"
            echo "$body"
            exit 1
          fi
          
          state=$(echo "$body" | jq -r .state)
          if [ -z "$state" ] || [ "$state" = "null" ]; then
            echo "Error: Unable to parse workflow state"
            exit 1
          fi
          
          if [ "$state" != "active" ]; then
            echo "Enabling workflow $workflow_file (current state: $state)"
            
            enable_response=$(curl -s -w "\n%{http_code}" -X PUT -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/$repo/actions/workflows/$workflow_file/enable")
            enable_http_code=$(echo "$enable_response" | tail -n1)
            
            if [ "$enable_http_code" != "204" ]; then
              echo "Error: Failed to enable workflow (HTTP $enable_http_code)"
              echo "$(echo "$enable_response" | sed '$d')"
              exit 1
            fi
            
            # Poll for workflow to become active, up to 5 seconds
            echo "Waiting for workflow to activate..."
            for i in {1..5}; do
              check_response=$(curl -s -w "\n%{http_code}" -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/$repo/actions/workflows/$workflow_file")
              check_http_code=$(echo "$check_response" | tail -n1)
              
              if [ "$check_http_code" = "200" ]; then
                state=$(echo "$check_response" | sed '$d' | jq -r .state)
                if [ "$state" = "active" ]; then
                  echo "Workflow $workflow_file is now active"
                  break
                fi
              else
                echo "Warning: Failed to check workflow state during polling (HTTP $check_http_code)"
              fi
              
              if [ $i -eq 5 ]; then
                echo "Warning: Workflow may not be fully active yet after 5 seconds"
              fi
              sleep 1
            done
          else
            echo "Workflow $workflow_file already active"
          fi
      - name: Generate graphs
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Graphs CI
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Generate site
        uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
      - uses: peaceiris/actions-gh-pages@v4
        name: GitHub Pages Deploy
        with:
          github_token: ${{ secrets.GH_PAT || github.token }}
          publish_dir: "site/status-page/__sapper__/export/"
          force_orphan: "false"
          user_name: "Upptime Bot"
          user_email: "73812536+upptime-bot@users.noreply.github.com"
